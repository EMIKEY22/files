<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blnk Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1c2333;
      --border-bright: #2d3f55;
      --text: #cdd9e5;
      --text-dim: #636e7b;
      --text-bright: #e6edf3;
      --accent: #58a6ff;
      --danger: #f85149;
      --warn: #d29922;
      --ok: #3fb950;
      --ok-dim: rgba(63, 185, 80, 0.1);
      --danger-dim: rgba(248, 81, 73, 0.12);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      color: var(--text-bright); letter-spacing: 0.02em;
    }

    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok); box-shadow: 0 0 8px var(--ok);
    }

    nav { display: flex; gap: 6px; }

    nav a {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      padding: 6px 14px; border-radius: 4px; text-decoration: none;
      color: var(--text-dim); border: 1px solid transparent;
      transition: all 0.15s;
    }

    nav a:hover { color: var(--text-bright); border-color: var(--border-bright); }
    nav a.active { color: var(--accent); border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.08); }

    main { max-width: 1100px; margin: 0 auto; padding: 28px; }

    h2 {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 14px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 28px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 20px;
    }

    .card h3 {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }

    .field label {
      font-size: 11px; font-family: var(--mono);
      color: var(--text-dim); letter-spacing: 0.04em;
    }

    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border-bright);
      border-radius: 4px; padding: 8px 12px;
      color: var(--text-bright); font-family: var(--mono); font-size: 13px;
      outline: none; transition: border-color 0.15s; width: 100%;
    }

    .field input:focus, .field select:focus { border-color: var(--accent); }

    .btn {
      width: 100%; padding: 9px 0; border-radius: 4px; border: none;
      cursor: pointer; font-family: var(--mono); font-size: 12px;
      font-weight: 600; letter-spacing: 0.06em; transition: opacity 0.15s;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #080c10; }
    .btn-green { background: var(--ok); color: #080c10; }
    .btn-warn { background: var(--warn); color: #080c10; }

    .result {
      margin-top: 12px; padding: 10px 14px; border-radius: 4px;
      font-family: var(--mono); font-size: 11px; line-height: 1.6;
      display: none; word-break: break-all;
    }
    .result.ok { background: var(--ok-dim); border: 1px solid rgba(63,185,80,0.25); color: var(--ok); display: block; }
    .result.err { background: var(--danger-dim); border: 1px solid rgba(248,81,73,0.3); color: var(--danger); display: block; }

    /* Wallets list */
    .wallets-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden; margin-bottom: 28px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border-bright); }
    th {
      padding: 10px 16px; font-family: var(--mono); font-size: 10px;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); text-align: left;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(88,166,255,0.04); }
    td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }
    .mono { font-family: var(--mono); }
    .dim { color: var(--text-dim); }

    .balance-amount {
      font-family: var(--mono); font-size: 15px;
      font-weight: 600; color: var(--ok);
    }

    .copy-btn {
      background: none; border: 1px solid var(--border-bright);
      color: var(--text-dim); font-family: var(--mono); font-size: 10px;
      padding: 2px 8px; border-radius: 3px; cursor: pointer;
      transition: all 0.15s; margin-left: 6px;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    .view-btn {
      background: none; border: 1px solid var(--border-bright);
      color: var(--accent); font-family: var(--mono); font-size: 10px;
      padding: 4px 10px; border-radius: 3px; cursor: pointer;
      transition: all 0.15s;
    }
    .view-btn:hover { background: rgba(88,166,255,0.1); }

    .empty-state {
      padding: 40px; text-align: center;
      color: var(--text-dim); font-family: var(--mono); font-size: 12px;
    }
    .empty-state span { display: block; font-size: 24px; margin-bottom: 8px; }

    /* Transaction history modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border-bright);
      border-radius: 8px; width: 700px; max-height: 80vh;
      overflow-y: auto; padding: 24px;
    }

    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent);
    }

    .close-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }
    .close-btn:hover { color: var(--text-bright); }

    .tx-item {
      padding: 10px 0; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .tx-item:last-child { border-bottom: none; }

    .tx-ref { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    .tx-desc { font-size: 13px; color: var(--text-bright); margin-bottom: 2px; }
    .tx-amount { font-family: var(--mono); font-size: 14px; font-weight: 600; }
    .tx-credit { color: var(--ok); }
    .tx-debit { color: var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BLNK / WALLET
  </div>
  <nav>
    <a href="index.html">Anomaly Detector</a>
    <a href="wallet.html" class="active">Wallet</a>
  </nav>
</header>

<main>

  <!-- Action cards -->
  <div class="grid-3">

    <!-- Create Wallet -->
    <div class="card">
      <h3>➕ Create Wallet</h3>
      <div class="field">
        <label>Owner Name</label>
        <input type="text" id="create-owner" placeholder="e.g. alice" />
      </div>
      <div class="field">
        <label>Currency</label>
        <input type="text" id="create-currency" value="USD" />
      </div>
      <button class="btn btn-primary" onclick="createWallet()">Create Wallet</button>
      <div class="result" id="create-result"></div>
    </div>

    <!-- Deposit -->
    <div class="card">
      <h3>💰 Deposit Funds</h3>
      <div class="field">
        <label>Wallet ID</label>
        <input type="text" id="deposit-walletid" placeholder="bln_xxx..." />
      </div>
      <div class="field">
        <label>Amount</label>
        <input type="number" id="deposit-amount" placeholder="1000" />
      </div>
      <div class="field">
        <label>Currency</label>
        <input type="text" id="deposit-currency" value="USD" />
      </div>
      <button class="btn btn-green" onclick="deposit()">Deposit</button>
      <div class="result" id="deposit-result"></div>
    </div>

    <!-- Transfer -->
    <div class="card">
      <h3>↗️ Transfer</h3>
      <div class="field">
        <label>From Wallet ID</label>
        <input type="text" id="transfer-from" placeholder="bln_xxx..." />
      </div>
      <div class="field">
        <label>To Wallet ID</label>
        <input type="text" id="transfer-to" placeholder="bln_yyy..." />
      </div>
      <div class="field">
        <label>Amount</label>
        <input type="number" id="transfer-amount" placeholder="500" />
      </div>
      <button class="btn btn-warn" onclick="transfer()">Transfer</button>
      <div class="result" id="transfer-result"></div>
    </div>

  </div>

  <!-- Wallets table -->
  <h2>Wallets Created This Session</h2>
  <div class="wallets-wrap">
    <table>
      <thead>
        <tr>
          <th>Owner</th>
          <th>Wallet ID</th>
          <th>Currency</th>
          <th>Balance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="wallets-body">
        <tr><td colspan="5">
          <div class="empty-state"><span>👛</span>No wallets yet. Create one above.</div>
        </td></tr>
      </tbody>
    </table>
  </div>

</main>

<!-- Transaction history modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Transaction History</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  // Session wallet store (in-memory, refreshes on page reload)
  const wallets = JSON.parse(localStorage.getItem('blnk_wallets') || '[]');

  function showResult(id, message, isError = false) {
    const el = document.getElementById(id);
    el.className = 'result ' + (isError ? 'err' : 'ok');
    el.textContent = message;
  }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text);
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }

  function renderWallets() {
    const tbody = document.getElementById('wallets-body');
    if (!wallets.length) {
      tbody.innerHTML = `<tr><td colspan="5">
        <div class="empty-state"><span>👛</span>No wallets yet. Create one above.</div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = wallets.map(w => `
      <tr>
        <td class="mono" style="color:var(--text-bright)">${w.owner}</td>
        <td>
          <span class="mono dim" style="font-size:11px">${w.walletId}</span>
          <button class="copy-btn" onclick="copyToClipboard('${w.walletId}', this)">Copy</button>
        </td>
        <td class="mono dim">${w.currency}</td>
        <td><span class="balance-amount" id="bal-${w.walletId}">${w.balance.toLocaleString()}</span></td>
        <td>
          <button class="view-btn" onclick="viewWallet('${w.walletId}', '${w.owner}')">View Txns</button>
        </td>
      </tr>
    `).join('');
  }

  async function createWallet() {
    const owner = document.getElementById('create-owner').value.trim();
    const currency = document.getElementById('create-currency').value.trim() || 'USD';

    if (!owner) { showResult('create-result', 'Owner name is required', true); return; }

    try {
      const res = await fetch('/api/wallet/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ owner, currency })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Failed');

      wallets.push(data);
      localStorage.setItem('blnk_wallets', JSON.stringify(wallets));
      renderWallets();
      showResult('create-result', `✓ Wallet created!\nID: ${data.walletId}`);

      // Auto-fill deposit and transfer fields for convenience
      document.getElementById('deposit-walletid').value = data.walletId;
      document.getElementById('transfer-from').value = data.walletId;

    } catch (err) {
      showResult('create-result', `Error: ${err.message}`, true);
    }
  }

  async function deposit() {
    const walletId = document.getElementById('deposit-walletid').value.trim();
    const amount = parseFloat(document.getElementById('deposit-amount').value);
    const currency = document.getElementById('deposit-currency').value.trim() || 'USD';

    if (!walletId || !amount) { showResult('deposit-result', 'Wallet ID and amount are required', true); return; }

    try {
      const res = await fetch('/api/wallet/deposit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ walletId, amount, currency })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Failed');

      // Update balance display
      const balEl = document.getElementById(`bal-${walletId}`);
      if (balEl) balEl.textContent = data.newBalance.toLocaleString();
      const w = wallets.find(x => x.walletId === walletId);
      if (w) w.balance = data.newBalance;

      showResult('deposit-result', `✓ Deposited ${amount.toLocaleString()} ${currency}\nTx ID: ${data.transactionId}\nNew balance: ${data.newBalance.toLocaleString()}`);

    } catch (err) {
      showResult('deposit-result', `Error: ${err.message}`, true);
    }
  }

  async function transfer() {
    const fromWalletId = document.getElementById('transfer-from').value.trim();
    const toWalletId = document.getElementById('transfer-to').value.trim();
    const amount = parseFloat(document.getElementById('transfer-amount').value);

    if (!fromWalletId || !toWalletId || !amount) {
      showResult('transfer-result', 'All fields are required', true); return;
    }

    try {
      const res = await fetch('/api/wallet/transfer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromWalletId, toWalletId, amount })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Failed');

      showResult('transfer-result',
        `✓ Transferred ${amount.toLocaleString()}\nTx ID: ${data.transactionId}\n⚠ This transaction is now being scored by the anomaly detector`
      );

      // Refresh balances for both wallets
      refreshBalance(fromWalletId);
      refreshBalance(toWalletId);

    } catch (err) {
      showResult('transfer-result', `Error: ${err.message}`, true);
    }
  }

  async function refreshBalance(walletId) {
    try {
      const res = await fetch(`/api/wallet/${walletId}`);
      const data = await res.json();
      const rawBalance = data.balance.balance || data.balance.credit_balance || 0;
      const balEl = document.getElementById(`bal-${walletId}`);
      if (balEl) balEl.textContent = rawBalance.toLocaleString();
      const w = wallets.find(x => x.walletId === walletId);
      if (w) { w.balance = rawBalance; localStorage.setItem('blnk_wallets', JSON.stringify(wallets)); }
    } catch (_) {}
  }

  async function viewWallet(walletId, owner) {
    document.getElementById('modal-title').textContent = `${owner} — Transaction History`;
    document.getElementById('modal-body').innerHTML = '<p style="color:var(--text-dim);font-family:var(--mono);font-size:12px">Loading...</p>';
    document.getElementById('modal').classList.add('open');

    try {
      const res = await fetch(`/api/wallet/${walletId}`);
      const data = await res.json();
      const txns = data.transactions ?? [];

      if (!txns.length) {
        document.getElementById('modal-body').innerHTML =
          '<p style="color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0">No transactions yet.</p>';
        return;
      }

      document.getElementById('modal-body').innerHTML = txns.map(tx => {
        const isCredit = tx.destination === walletId;
        const sign = isCredit ? '+' : '-';
        const cls = isCredit ? 'tx-credit' : 'tx-debit';
        return `
          <div class="tx-item">
            <div>
              <div class="tx-desc">${tx.description ?? 'Transaction'}</div>
              <div class="tx-ref">${tx.reference} · ${new Date(tx.created_at).toLocaleString()}</div>
            </div>
            <div class="tx-amount ${cls}">${sign}${tx.amount.toLocaleString()} ${tx.currency}</div>
          </div>`;
      }).join('');

    } catch (err) {
      document.getElementById('modal-body').innerHTML =
        `<p style="color:var(--danger);font-family:var(--mono);font-size:12px">Error: ${err.message}</p>`;
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // Close modal on backdrop click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Render saved wallets on page load
  renderWallets();
</script>

</body>
</html>
